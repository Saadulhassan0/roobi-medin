services:
  - type: web
    name: roobi-backend
    env: docker
    plan: free
    envVars:
      - key: DB_HOST
        value: "your-cloud-database-host"
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "your-database-name"
      - key: DB_USER
        value: "your-database-username"
      - key: DB_PASS
        value: "your-database-password"
